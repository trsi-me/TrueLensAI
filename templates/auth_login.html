{% extends "base.html" %}
{% block title %}Sign in — TrueLens AI{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="auth-lead">Use your email and password to access your scan history and save new results.</p>
    <form class="auth-form" method="post" action="{{ url_for('auth.login') }}" novalidate>
      <input type="hidden" name="next" value="{{ next_url or '' }}" />
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary">Sign in</button>
      </div>
    </form>
    <p class="auth-alt">
      No account yet?
      <a href="{{ url_for('auth.register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
