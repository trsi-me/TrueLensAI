{% extends "base.html" %}
{% block title %}Scan History — TrueLens AI{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}" />
{% endblock %}
{% block content %}
<h1>Scan History</h1>
<div class="history-toolbar">
  <label for="history-filter">Type:</label>
  <select id="history-filter">
    <option value="all">All</option>
    <option value="text">News</option>
    <option value="image">Images</option>
    <option value="video">Video</option>
  </select>
  <button type="button" class="btn-danger-sm" id="history-clear-all">Clear All</button>
</div>
<p class="empty-msg" id="history-empty">No records yet.</p>
<div class="table-wrap">
  <table class="data-table" id="history-table">
    <thead>
      <tr>
        <th>Type</th>
        <th>Input Summary</th>
        <th>Result</th>
        <th>Confidence</th>
        <th>Date &amp; Time</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="history-tbody"></tbody>
  </table>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
