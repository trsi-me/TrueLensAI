# Render Blueprint — ضع الملف في جذر الريبو المربوط بـ GitHub ثم New Blueprint في لوحة Render.
# إذا جذر الريبو ليس مجلد TrueLensAI، أضف: rootDir: المسار/إلى/TrueLensAI
services:
  - type: web
    runtime: python
    name: truelens-ai
    plan: free
    region: oregon
    # LFS → auto-export image_model.tflite from .h5 during build → slim runtime (no TensorFlow on instance).
    buildCommand: bash scripts/render_build.sh
    # threads=1 lowers peak RAM; TFLite image model avoids loading full TensorFlow at inference.
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 180 wsgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: TF_NUM_INTEROP_THREADS
        value: "1"
      - key: TF_NUM_INTRAOP_THREADS
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: TRUELENS_IMAGE_ONLY_TFLITE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
