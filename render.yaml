# Render Blueprint — ضع الملف في جذر الريبو المربوط بـ GitHub ثم New Blueprint في لوحة Render.
# إذا جذر الريبو ليس مجلد TrueLensAI، أضف: rootDir: المسار/إلى/TrueLensAI
services:
  - type: web
    runtime: python
    name: truelens-ai
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 wsgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: SECRET_KEY
        generateValue: true
