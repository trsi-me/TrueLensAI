# Render Blueprint — ضع الملف في جذر الريبو المربوط بـ GitHub ثم New Blueprint في لوحة Render.
# إذا جذر الريبو ليس مجلد TrueLensAI، أضف: rootDir: المسار/إلى/TrueLensAI
services:
  - type: web
    runtime: python
    name: truelens-ai
    plan: free
    region: oregon
    # Native Render images ship git but not git-lfs; without a pull, *.h5 / *.pkl stay as LFS pointers.
    buildCommand: bash scripts/render_git_lfs_pull.sh && pip install -r requirements.txt && python scripts/fetch_pretrained_models.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 wsgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: SECRET_KEY
        generateValue: true
